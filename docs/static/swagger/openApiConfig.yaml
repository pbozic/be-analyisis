openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
servers:
  - url: http://localhost:3001/api
    description: Development server server (uses local data)
  - url: https://sandbox-api.example.com:8443/v1
    description: Sandbox server (uses test data)
tags:
  - name: Authentication
    description: Authentication Operations
  - name: Users
    description: Operations about user
  - name: Business
    description: Operations about business
  - name: Taxi
    description: Operations about taxi
  - name: Finances
    description: Operations about business finances
  - name: Drivers
    description: Operations about transfer drivers
  - name: Vehicles
    description: Operations about vehicles
  - name: Documents
    description: Operations about documents
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
paths:
  /auth/scheduled_users:
    post:
      tags:
        - User
      summary: Get scheduled users
      description: This function fetches all scheduled users.
      operationId: getScheduledUsers
      requestBody:
        description: Request body must include necessary order details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/getScheduledUsersRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the newly created order in the
            response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getScheduledUsers'
        '500':
          description: >-
            Server error. Returns error message "Something went wrong..." if any
            exception is encountered during execution.
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login procedure.
      description: >-
        This verifies the user's credentials and responds with an access token
        and refresh token if successful.
      operationId: loginUser.
      requestBody:
        description: Request body must include email and password for verification.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns user details along with accessToken
            and refreshToken in the response body, additionally sets
            Authorization header with the accessToken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUser'
          headers:
            Authorization:
              description: The newly generated access token.
              schema:
                type: string
        '400':
          description: >-
            Unsuccessful operation. Returns error message "Wrong email /
            password combination." if the either the email or password (or both)
            are incorrect.
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong.."
            if any exception is encountered during execution.
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: This endpoint is used to register a new user.
      operationId: registerNewUser
      requestBody:
        description: The required data to register a new user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '200':
          description: User registered successfully. Returns user info and tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUser'
          headers:
            Authorization:
              description: The newly generated access token.
              schema:
                type: string
        '400':
          description: Error something went wrong.
  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refreshes the user's access token
      description: This endpoint is used to refresh the user's access and refresh tokens.
      operationId: refreshToken
      requestBody:
        description: The refresh token of the user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '200':
          description: >-
            Access token successfully refreshed. Returns newly generated access
            and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
          headers:
            Authorization:
              description: The newly generated access token.
              schema:
                type: string
        '400':
          description: Access Denied. No refresh token provided.
        '401':
          description: Access Denied. Token expired.
  /auth/password-reset:
    post:
      tags:
        - Authentication
      summary: Request a password reset
      description: >-
        This endpoint is used to request a password reset. It will generate and
        send a password reset token to the user.
      operationId: requestPasswordReset
      requestBody:
        description: The email of the user who wants to reset their password.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      responses:
        '200':
          description: >-
            Password reset request processed. A token is sent to the user if the
            account is found.
        '400':
          description: Error obtaining user information.
  /auth/taxi/register:
    post:
      tags:
        - Auth
      summary: Register a new taxi service
      description: >-
        Creates a new business, multiple taxi, vehicles, and optionally finances
        and documents, and links them together.
      operationId: registerTaxiService
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxiServiceRegistration'
        required: true
      responses:
        '201':
          description: Taxi service registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiServiceRegistrationResponse'
        '400':
          description: Error registering taxi service
  /auth/delivery/register:
    post:
      tags:
        - Auth
      summary: Register a new delivery service
      description: >-
        Creates a new business, multiple delivery drivers, vehicles, and
        optionally finances and documents, and links them together.
      operationId: registerDeliveryService
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryServiceRegistration'
        required: true
      responses:
        '201':
          description: Delivery service registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryServiceRegistrationResponse'
        '400':
          description: Error registering delivery service
  /auth/merchant/register:
    post:
      tags:
        - Auth
      summary: Register a new merchant service
      description: >-
        Creates a new business, optionally business users, finances, and
        documents, and links them together.
      operationId: registerMerchantService
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantServiceRegistration'
        required: true
      responses:
        '201':
          description: Merchant service registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantServiceRegistrationResponse'
        '400':
          description: Error registering merchant service
  /auth/business/register:
    post:
      tags:
        - Auth
      summary: Register a new business
      description: >-
        Creates a new business, optionally business users, finances, and
        documents, and links them together.
      operationId: registerBusiness
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessRegistration'
        required: true
      responses:
        '201':
          description: Business registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessRegistrationResponse'
        '400':
          description: Error registering business
  /auth/create/scheduled_user:
    post:
      tags:
        - User
      summary: Create a new scheduled user.
      description: This created new scheduled user.
      operationId: createScheduledUser
      requestBody:
        description: Request body must include necessary order details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createScheduledUserRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the newly created order in the
            response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createScheduledUser'
        '500':
          description: >-
            Server error. Returns error message "Something went wrong..." if any
            exception is encountered during execution.
  /update/scheduled_user:
    patch:
      tags:
        - Users
      summary: Updates a scheduled user's details
      description: This endpoint is used to update a scheduled user's details.
      operationId: updateScheduledUser
      requestBody:
        description: The data to update for the current user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateScheduledUserRequest'
        required: true
      responses:
        '200':
          description: User updated successfully. Returns the updated user's details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUser'
        '400':
          description: Error updating user information.
  /business-clients:
    get:
      tags:
        - BusinessClients
      summary: Get a list of all business clients
      description: Returns a list of all business clients.
      operationId: getAllBusinessClients
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessClient'
        '400':
          description: Error occurred while obtaining the business client list
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
        - BusinessClients
      summary: Create a new business client
      description: Creates a new business client and links it to a business.
      operationId: createBusinessClient
      requestBody:
        description: The data to create a new business client
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessClientRequest'
        required: true
      responses:
        '201':
          description: >-
            Business client created successfully. Returns the created business
            client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessClient'
        '400':
          description: Error creating business client.
  /business-clients/{business_clients_id}:
    get:
      tags:
        - BusinessClients
      summary: Get a business client by ID
      description: Returns a business client.
      operationId: getBusinessClientById
      parameters:
        - name: business_clients_id
          in: path
          description: The ID of the business client
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessClient'
        '400':
          description: Error occurred while obtaining the business client
          content:
            application/json:
              schema:
                type: object
    patch:
      tags:
        - BusinessClients
      summary: Update a business client
      description: Updates a business client's information.
      operationId: updateBusinessClient
      parameters:
        - name: business_clients_id
          in: path
          description: The ID of the business client to update
          required: true
          schema:
            type: string
      requestBody:
        description: The data to update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessClientRequest'
        required: true
      responses:
        '200':
          description: >-
            Business client updated successfully. Returns the updated business
            client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessClient'
        '400':
          description: Error updating business client.
        '404':
          description: Business client not found.
    delete:
      tags:
        - BusinessClients
      summary: Remove a business client
      description: Removes a business client by their ID.
      operationId: removeBusinessClient
      parameters:
        - name: business_clients_id
          in: path
          description: The ID of the business client to remove
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Business client removed successfully.
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error removing business client.
  /business-clients/business/{business_id}:
    get:
      tags:
        - BusinessClients
      summary: Get business clients by business ID
      description: Returns a list of business clients for a specific business ID.
      operationId: getBusinessClientsByBusinessId
      parameters:
        - name: business_id
          in: path
          description: The ID of the business
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessClient'
        '400':
          description: Error occurred while obtaining the business client list
          content:
            application/json:
              schema:
                type: object
  /business/activate:
    post:
      tags:
        - Business
      summary: Activate a business
      description: Activates a business.
      operationId: activateBusiness
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Error occurred while obtaining the business list
          content:
            application/json:
              schema:
                type: object
  /business/deactivate:
    post:
      tags:
        - Business
      summary: Deactivate a business
      description: Deactivates a business.
      operationId: deactivateBusiness
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Error occurred while obtaining the business list
          content:
            application/json:
              schema:
                type: object
  /businesses:
    get:
      tags:
        - Business
      summary: Get a list of businesses
      description: Returns a list of businesses.
      operationId: getBusinessesByType
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Error occurred while obtaining the business list
          content:
            application/json:
              schema:
                type: object
  /businesses/ids:
    post:
      tags:
        - Business
      summary: Get a list of businesses business_ids
      description: Returns a list of businesses.
      operationId: getBusinessesByIds
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Error occurred while obtaining the business list
          content:
            application/json:
              schema:
                type: object
  /businesses/search:
    post:
      tags:
        - Business
      summary: Get a list of businesses by query, location, categories, radius, etc.
      description: Returns a list of businesses filtered by search criteria.
      operationId: getBusinessesSearch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchBusinessesRequest'
        required: true
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchBusinessesResponse'
        '400':
          description: Error occurred while obtaining the business list
          content:
            application/json:
              schema:
                type: object
    get:
      tags:
        - Business
      summary: Search for businesses by name
      description: >-
        Retrieves businesses whose names contain the given search term,
        case-insensitively.
      operationId: getBusinessesByNameSearch
      parameters:
        - name: search
          in: query
          description: The search term to look for in business names
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns a list of matching businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while searching for businesses by name
  /businesses/merchant:
    get:
      tags:
        - Business
      summary: List all merchant businesses
      description: Retrieves a list of all businesses classified as merchants.
      operationId: listMerchantBusinesses
      responses:
        '200':
          description: Successful operation, returns a list of merchant businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while obtaining the merchant business list
  /businesses/sections/merchant:
    post:
      tags:
        - Business
      summary: List all merchant businesses grouped by promoSections
      description: Retrieves a list of all businesses classified as merchants.
      operationId: listMerchantBusinesses
      responses:
        '200':
          description: Successful operation, returns a list of merchant businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while obtaining the merchant business list
  /businesses/merchant/daily-meals:
    get:
      tags:
        - Business
      summary: List all merchant businesses offering daily meals
      description: >-
        Retrieves a list of all businesses classified as merchants that offer
        daily meals.
      operationId: listMerchantBusinessesWithDailyMeals
      responses:
        '200':
          description: >-
            Successful operation, returns a list of merchant businesses offering
            daily meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while obtaining the merchant business list
  /businesses/merchant/main:
    get:
      tags:
        - Business
      summary: List all merchant businesses offering daily meals
      description: >-
        Retrieves a list of all businesses classified as merchants that offer
        daily meals.
      operationId: listMerchantBusinessesWithDailyMeals
      responses:
        '200':
          description: >-
            Successful operation, returns a list of merchant businesses offering
            daily meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while obtaining the merchant business list
  /businesses/taxi/main:
    get:
      tags:
        - Business
      summary: List all transfer businesses (main info only)
      description: Retrieves a list of all transfer businesses
      operationId: listTransferBusinessesMainInfo
      responses:
        '200':
          description: Successful operation, returns a list of transfer businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while obtaining the transfer businesses list
  /businesses/taxis:
    get:
      tags:
        - Business
      summary: List all taxi businesses
      description: Retrieves a list of all businesses classified as taxis (TRANSFER).
      operationId: listTaxiBusinesses
      responses:
        '200':
          description: Successful operation, returns a list of taxi businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error occurred while obtaining the taxi business list
  /business/:business_id:
    get:
      tags:
        - Business
      summary: Get a business by ID
      description: Retrieves detailed information about a specific business by its ID.
      operationId: getBusinessById
      parameters:
        - name: business_id
          in: path
          description: The ID of the business to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns detailed business information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error retrieving business information
        '404':
          description: Business not found
    delete:
      tags:
        - Business
      summary: Delete a business
      description: Deletes a business by its ID.
      operationId: deleteBusiness
      parameters:
        - name: business_id
          in: path
          description: The ID of the business to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Business deleted successfully
        '400':
          description: Error deleting business
  /admin/business/:business_id:
    get:
      tags:
        - Business
      summary: Get a business by ID including admin data
      description: >-
        Retrieves detailed information about a specific business by its ID,
        including data an admin can see.
      operationId: getBusinessAdminDataById
      parameters:
        - name: business_id
          in: path
          description: The ID of the business to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns detailed business information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error retrieving business information
        '404':
          description: Business not found
  /business/search/:business_id:
    get:
      tags:
        - Business
      summary: Get a business for search by ID
      description: Retrieves detailed information about a specific business by its ID.
      operationId: getBusinessForSearchById
      parameters:
        - name: business_id
          in: path
          description: The ID of the business to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns detailed business information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error retrieving business information
        '404':
          description: Business not found
  /business/parent/:business_id:
    get:
      tags:
        - Business
      summary: Get parent business
      description: Retrieves the parent business of a specific business by its ID.
      operationId: getParentBusiness
      parameters:
        - name: business_id
          in: path
          description: The ID of the child business
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns parent business information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error retrieving parent business information
        '404':
          description: Parent business not found
  /business/children/:parent_business_id:
    get:
      tags:
        - Business
      summary: List child businesses
      description: Retrieves a list of child businesses for a specific parent business ID.
      operationId: getChildBusinesses
      parameters:
        - name: parent_business_id
          in: path
          description: The ID of the parent business
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns a list of child businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Business'
        '400':
          description: Error retrieving child businesses information
  /business:
    post:
      tags:
        - Business
      summary: Create a new business
      description: Creates a new business with the provided details.
      operationId: createNewBusiness
      requestBody:
        description: The business details to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessCreateRequest'
        required: true
      responses:
        '201':
          description: Business created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error creating new business
  /business/:
    patch:
      tags:
        - Business
      summary: Updates the business details
      description: This endpoint is used to update the business details.
      operationId: updateBusiness
      parameters:
        - name: businessId
          in: path
          description: The ID of the business to update
          required: true
          schema:
            type: string
      requestBody:
        description: The data to update for the business.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessRequest'
        required: true
      responses:
        '200':
          description: Business updated successfully. Returns the updated business details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error updating business information.
  /business/type:
    patch:
      tags:
        - Business
      summary: Updates a business's type
      description: This endpoint is used to update a business's type.
      operationId: updateBusinessType
      requestBody:
        description: The new type for the business
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessTypeRequest'
        required: true
      responses:
        '200':
          description: Type updated successfully. Returns the updated business details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error updating business information.
  /business/business-unit:
    patch:
      tags:
        - Businesses
      summary: Updates the business unit status
      description: >-
        This endpoint is used to update whether a business is considered a
        business unit.
      operationId: updateIsBusinessUnit
      requestBody:
        description: The new business unit status
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIsBusinessUnitRequest'
        required: true
      responses:
        '200':
          description: >-
            Business unit status updated successfully. Returns the updated
            business details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error updating business information.
  /business/business-group-name:
    patch:
      tags:
        - Businesses
      summary: Updates a business's group name
      description: This endpoint is used to update a business's group name.
      operationId: updateBusinessGroupName
      requestBody:
        description: The new group name for the business
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessGroupNameRequest'
        required: true
