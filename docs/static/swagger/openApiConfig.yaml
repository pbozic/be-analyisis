  /delivery/order/merchant_accept:
    post:
      tags:
        - Delivery
      summary: Merchant accepts a delivery order and processes payment.
      description: >-

        Processes a delivery order from PENDING status.

        Captures payment (if neccessary), updates order status, and emits
        relevant events.

        Handles payment via CARD, WALLET, PLATFORM, or CASH, and moves the order
        through the correct state transitions.

        In the case of a CARD or PLATFORM payment, the payment and state
        transitions are left up to the stripe webhook handler.

        If preparation_time is provided, updates the order's pickup time.
      operationId: merchantAcceptOrder
      requestBody:
        description: >-
          The request body must include 'order_id' to identify the order and
          optionally 'preparation_time' (ISO string or timestamp).
        content:
          application/json:
            schema:
              $ref: |
                #/components/schemas/
                  "order_id": 123,
                  "preparation_time": "2025-07-30T12:00:00.000Z"
        required: true
      responses:
        '200':
          description: >-
            Order processed and moved to next state. Returns the updated
            DeliveryOrder object.
          content:
            application/json:
              schema:
                $ref: |
                  #/components/schemas/
                    "order_id": 123,
                    "user_id": 456,
                    "business_id": 789,
                    "details": { ... },
                    "status": "MERCHANT_PREPARING",
                    "payment": { ... },
                    "items": [ ... ],
                    "timeline": [ ... ],
                    "created_at": "...",
                    "updated_at": "..."
              examples:
                undefined:
                  $ref: '#/components/examples/'
        '400':
          description: Preparation time must be set if not scheduled.
        '500':
          description: Error processing the order.
  /delivery/orders/order/merchant_ready:
    post:
      tags:
        - Delivery
      summary: Merchant confirms order is ready for pickup.
      description: >-

        If needed recalculates pricing and processes payment then updates the
        order

        as ready for pickup and if needed, and emits relevant events.

        Handles payment via CARD, WALLET, PLATFORM, or CASH, and moves the order
        through the correct state transitions.

        In the case of a CARD or PLATFORM payment, the payment and state
        transitions are left up to the stripe webhook handler.
      operationId: merchantConfirmOrderReady
      requestBody:
        description: The request body must include 'order_id' to identify the order.
        content:
          application/json:
            schema:
              $ref: |
                #/components/schemas/
                  "order_id": 123
        required: true
      responses:
        '200':
          description: >-
            Order marked as ready for pickup. Returns the updated DeliveryOrder
            object.
          content:
            application/json:
              schema:
                $ref: |
                  #/components/schemas/
                    "order_id": 123,
                    "user_id": 456,
                    "business_id": 789,
                    "details": { ... },
                    "status": "MERCHANT_READY_FOR_PICKUP",
                    "payment": { ... },
                    "items": [ ... ],
                    "timeline": [ ... ],
                    "created_at": "...",
                    "updated_at": "..."
              examples:
                undefined:
                  $ref: '#/components/examples/'
        '500':
          description: Error processing the order.
  /delivery/orders/order/local_ready:
    post:
      tags:
