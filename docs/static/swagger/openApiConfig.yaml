      summary: LOCAL business confirms multiple orders are ready for pickup.
      description: >-

        Sets all preparing orders for a specific business_local_location as
        ready for pickup.

        Only works for LOCAL business type. Recalculates pricing and processes
        payments for all orders,

        then updates them as ready for pickup and emits relevant events.

        Handles payment via CARD, WALLET, PLATFORM, or CASH for each order.
      operationId: localConfirmMultipleOrdersReady
      requestBody:
        description: >-
          The request body must include 'business_local_location_id' to identify
