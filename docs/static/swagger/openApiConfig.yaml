        content:
          application/json:
            schema:
              $ref: |
                #/components/schemas/
                  "business_local_location_id": "uuid-string"
        required: true
      responses:
        '200':
          description: >-
            Orders marked as ready for pickup. Returns summary of processed
            orders.
          content:
            application/json:
              schema:
                $ref: |
                  #/components/schemas/
                    "success": true,
                    "processed_orders": 5,
                    "successful_orders": 4,
                    "failed_orders": 1,
                    "orders": [
                      {
                        "order_id": 123,
                        "status": "success",
                        "order": { ... }
                      },
                      {
                        "order_id": 124,
                        "status": "failed",
                        "error": "Payment processing failed"
                      }
                    ]
              examples:
                undefined:
                  $ref: '#/components/examples/'
        '400':
          description: Invalid business_local_location_id or no preparing orders found.
        '500':
          description: Error processing the orders.
