openapi: 3.0.3
info:
  title: get /api/documents/type/:documentType
  version: 1.0.0
paths:
  /api/documents/type/:documentType:
    get:
      tags:
        - Documents
      summary: Get documents by type
      description: Retrieves documents of a specific type across all entities.
      operationId: getDocumentsByType
      parameters:
        - name: documentType
          in: path
          description: The type of the documents to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving documents
