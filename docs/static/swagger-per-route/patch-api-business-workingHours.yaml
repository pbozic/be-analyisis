openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/business/workingHours:
    patch:
      tags:
        - Business
      summary: Updates a business's working hours
      description: This endpoint is used to update a business's working hours.
      operationId: updateBusinessWorkingHours
      parameters:
        - name: business_id
          in: path
          description: The ID of the business to update
          required: true
          schema:
            type: string
      requestBody:
        description: The new working hours for the business
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessWorkingHoursRequest'
        required: true
      responses:
        '200':
          description: >-
            Working hours updated successfully. Returns the updated business
            details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error updating business information.
components: {}
