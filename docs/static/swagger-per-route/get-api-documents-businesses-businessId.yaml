openapi: 3.0.3
info:
  title: get /api/documents/businesses/:businessId
  version: 1.0.0
paths:
  /api/documents/businesses/:businessId:
    get:
      tags:
        - Documents
      summary: Get documents for a business
      description: Retrieves all documents associated with a specific business.
      operationId: getDocumentsForBusiness
      parameters:
        - name: businessId
          in: path
          description: The ID of the business
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving documents
