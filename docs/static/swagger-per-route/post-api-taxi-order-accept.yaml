openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/taxi/order/accept:
    post:
      tags:
        - Taxi
      summary: Accept a taxi order.
      description: >-
        Accepts taxi order with the provided details from the request body.
        Returns the accepted order if successful.
      operationId: acceptOrder
      requestBody:
        description: Request body must include necessary order details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxiOrderRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the accepted order in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Returns error message "Something went wrong..." if any
            exception is encountered during execution.
components: {}
