openapi: 3.0.3
info:
  title: patch /api/documents/expirationDate
  version: 1.0.0
paths:
  /api/documents/expirationDate:
    patch:
      tags:
        - Documents
      summary: Update document's expiration date
      description: Updates the expiration date of a specific document.
      operationId: updateDocumentExpirationDate
      parameters:
        - name: document_id
          in: path
          description: The ID of the document to update
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpirationDateRequest'
        required: true
      responses:
        '200':
          description: Document expiration date updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Error updating document's expiration date
