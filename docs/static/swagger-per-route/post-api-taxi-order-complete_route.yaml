openapi: 3.0.3
info:
  title: post /api/taxi/order/complete_route
  version: 1.0.0
paths:
  /api/taxi/order/complete_route:
    post:
      tags:
        - Taxi
      summary: Update a taxi order's complete route.
      description: >-
        Updates the complete route of a specific taxi order based on the
        provided details from the request body. Returns the updated order if
        successful.
      operationId: updateCompleteTaxiRoute
      requestBody:
        description: Request body must include 'order_id', and the new 'route' details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompleteRouteRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the updated order with the new
            complete route in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Returns error message if any exception is encountered
            during execution.
