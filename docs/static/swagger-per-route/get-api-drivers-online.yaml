openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/drivers/online:
    get:
      tags:
        - Drivers
      summary: Get all online drivers
      description: Returns a list of all drivers who are currently online.
      operationId: getOnlineDrivers
      responses:
        '200':
          description: Successful operation, returns a list of online drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'
        '400':
          description: Error occurred while obtaining the online driver list
components: {}
