openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/drivers/:driver_id/:action/:type:
    patch:
      tags:
        - Drivers
      summary: Enable or disable a driver
      description: >-
        Enables or disables a specific driver based on the provided action and
        type.
      operationId: setDriverHandle
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver to toggle
          required: true
          schema:
            type: string
        - name: action
          in: path
          description: The action to perform (enable or disable)
          required: true
          schema:
            type: string
        - name: type
          in: path
          description: The type of action (taxi, transfer, delivery)
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Driver toggled successfully
        '400':
          description: Error toggling driver
        '404':
          description: Driver not found
components: {}
