openapi: 3.0.3
info:
  title: patch /api/finances/:finance_id/bank_name
  version: 1.0.0
paths:
  /api/finances/:finance_id/bank_name:
    patch:
      tags:
        - Finance
      summary: Update bank name
      description: Updates the bank name for a specific finance record.
      operationId: updateBankName
      parameters:
        - name: finance_id
          in: path
          description: The ID of the finance record to update
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: Bank name updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finance'
        '400':
          description: Error updating bank name
