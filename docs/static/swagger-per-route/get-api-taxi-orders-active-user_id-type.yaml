openapi: 3.0.3
info:
  title: get /api/taxi/orders/active/:user_id/:type
  version: 1.0.0
paths:
  /api/taxi/orders/active/:user_id/:type:
    get:
      tags:
        - Taxi
      summary: Get active taxi orders.
      description: This fetches all completed orders for a specific user.
      operationId: getCompletedDeliveryOrders
      responses:
        '200':
          description: >-
            Successful operation. Returns a list of completed orders in the
            response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
