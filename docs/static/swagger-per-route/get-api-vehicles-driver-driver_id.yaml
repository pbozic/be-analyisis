openapi: 3.0.3
info:
  title: get /api/vehicles/driver/:driver_id
  version: 1.0.0
paths:
  /api/vehicles/driver/:driver_id:
    get:
      tags:
        - Vehicles
      summary: Get vehicles by driver ID
      description: Retrieves a list of vehicles assigned to a specific driver.
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '400':
          description: Error fetching vehicles for driver
