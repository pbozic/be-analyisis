  x-github: https://github.com/bee-travels
paths:
  /api/taxi/orders/active/driver/:driver_id:
    get:
      tags:
        - Taxi
      summary: Get active taxi orders for a driver.
      description: >-
        This fetches all active (not completed AND not pending) orders for a
        specific driver.
      operationId: getActiveTaxiOrdersByDriverId
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver to retrieve active orders for
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: >-
            Successful operation. Returns a list of active orders in the
            response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
components: {}
