openapi: 3.0.3
info:
  title: post /api/taxi/order/timeline
  version: 1.0.0
paths:
  /api/taxi/order/timeline:
    post:
      tags:
        - Taxi
      summary: Update a taxi order's timeline.
      description: Updates the timeline of a taxi order.
      operationId: updateTaxiOrderTimeline
      requestBody:
        description: Request body must include 'order_id', and the new 'timeline' details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaxiOrderTimelineRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the updated order with the new
            timeline in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Returns error message if any exception is encountered
            during execution.
