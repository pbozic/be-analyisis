openapi: 3.0.3
info:
  title: get /api/vehicles/business/:businessId
  version: 1.0.0
paths:
  /api/vehicles/business/:businessId:
    get:
      tags:
        - Vehicles
      summary: Get vehicles by business ID
      description: Retrieves vehicles associated with a specific business ID.
      parameters:
        - name: businessId
          in: path
          description: The ID of the business
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '500':
          description: Error fetching vehicles
