openapi: 3.0.3
info:
  title: get /api/documents/users/:userId
  version: 1.0.0
paths:
  /api/documents/users/:userId:
    get:
      tags:
        - Documents
      summary: Get documents for a user
      description: Retrieves all documents associated with a specific user.
      operationId: getDocumentsForUser
      parameters:
        - name: userId
          in: path
          description: The ID of the user
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving documents
