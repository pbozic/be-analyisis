openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/taxi/order/payment:
    post:
      tags:
        - Taxi
      summary: Update a taxi order's payment details.
      description: Updates the payment details of the order.
      operationId: updateTaxiOrderPayment
      requestBody:
        description: Request body must include 'order_id', and the new 'route' details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaxiOrderPaymentRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the updated order with the new payment
            details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Returns error message if any exception is encountered
            during execution.
components: {}
