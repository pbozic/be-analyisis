openapi: 3.0.3
info:
  title: post /api/taxi/order/delivery_location
  version: 1.0.0
paths:
  /api/taxi/order/delivery_location:
    post:
      tags:
        - Taxi
      summary: Update a taxi order's delivery location.
      description: >-
        Updates the delivery location of a specific taxi order based on the
        provided details from the request body. Returns the updated order if
        successful.
      operationId: updateTaxiOrderDeliveryLocation
      requestBody:
        description: >-
          Request body must include 'order_id' and the new 'delivery_location'
          details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderDeliveryLocationRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the updated order with the new
            delivery location in the response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Returns error message if any exception is encountered
            during execution.
