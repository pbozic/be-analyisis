openapi: 3.0.3
info:
  title: post /api/taxi/order/cancel
  version: 1.0.0
paths:
  /api/taxi/order/cancel:
    post:
      tags:
        - Taxi
      summary: Cancel a taxi order.
      description: >-
        Cancels a taxi order with the provided order ID, status, and
        cancellation reason from the request body. Returns the cancelled order
        if successful and emits a 'order_cancelled' event.
      operationId: cancelOrder
      requestBody:
        description: >-
          Request body must include 'order_id', 'status', and
          'cancellation_reason'.
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the cancelled order in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Console logs the error message and returns it in the
            response.
