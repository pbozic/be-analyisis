openapi: 3.0.3
info:
  title: get /api/vehicles/class/:vehicleClass/category/:vehicleCategory
  version: 1.0.0
paths:
  /api/vehicles/class/:vehicleClass/category/:vehicleCategory:
    get:
      tags:
        - Vehicles
      summary: Get vehicles by class and category
      description: Retrieves a list of vehicles of a specific class and category.
      parameters:
        - name: vehicleClass
          in: path
          description: The class of the vehicles
          required: true
          schema:
            type: string
        - name: vehicleCategory
          in: path
          description: The category of the vehicles
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
        '500':
          description: Error fetching vehicles
