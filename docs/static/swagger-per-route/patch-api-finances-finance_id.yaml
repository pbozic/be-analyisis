openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/finances/:finance_id:
    patch:
      tags:
        - Finance
      summary: Update finance record
      description: Updates an existing finance record by its ID.
      operationId: updateFinances
      parameters:
        - name: finance_id
          in: path
          description: The ID of the finance record to update
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinanceUpdate'
        required: true
      responses:
        '200':
          description: Finance record updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finance'
        '400':
          description: Error updating finance record
components: {}
