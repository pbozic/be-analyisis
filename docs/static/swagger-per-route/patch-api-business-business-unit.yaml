openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/business/business-unit:
    patch:
      tags:
        - Businesses
      summary: Updates the business unit status
      description: >-
        This endpoint is used to update whether a business is considered a
        business unit.
      operationId: updateIsBusinessUnit
      requestBody:
        description: The new business unit status
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIsBusinessUnitRequest'
        required: true
      responses:
        '200':
          description: >-
            Business unit status updated successfully. Returns the updated
            business details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '400':
          description: Error updating business information.
components: {}
