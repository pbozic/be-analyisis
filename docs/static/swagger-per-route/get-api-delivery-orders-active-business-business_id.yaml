openapi: 3.0.3
info:
  title: get /api/delivery/orders/active/business/:business_id
  version: 1.0.0
paths:
  /api/delivery/orders/active/business/:business_id:
    get:
      tags:
        - Delivery
      summary: Get active delivery orders.
      description: This fetches all completed orders for a specific business.
      operationId: getCompletedDeliveryOrdersByBusinessId
      responses:
        '200':
          description: >-
            Successful operation. Returns a list of completed orders in the
            response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
