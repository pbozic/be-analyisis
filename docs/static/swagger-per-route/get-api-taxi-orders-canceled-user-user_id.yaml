openapi: 3.0.3
info:
  title: get /api/taxi/orders/canceled/user/:user_id
  version: 1.0.0
paths:
  /api/taxi/orders/canceled/user/:user_id:
    get:
      tags:
        - Taxi
      summary: Get canceled taxi orders.
      description: This fetches all canceled orders for a specific driver.
      operationId: getCanceledTaxiOrders
      responses:
        '200':
          description: >-
            Successful operation. Returns a list of canceled orders in the
            response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
