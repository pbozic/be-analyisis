openapi: 3.0.3
info:
  title: post /api/documents/create/driver/:driver_id
  version: 1.0.0
paths:
  /api/documents/create/driver/:driver_id:
    post:
      tags:
        - Documents
      summary: Create a document for a driver
      description: Creates a new document and links it to a specific driver.
      operationId: createDriverDocument
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCreationRequest'
        required: true
      responses:
        '201':
          description: Document created and linked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Error creating or linking the document
