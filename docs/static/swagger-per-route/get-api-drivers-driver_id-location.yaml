openapi: 3.0.3
info:
  title: get /api/drivers/:driver_id/location
  version: 1.0.0
paths:
  /api/drivers/:driver_id/location:
    get:
      tags:
        - Drivers
      summary: Get driver location
      description: Retrieves the current location of a specific driver.
      operationId: getDriverLocation
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver whose location is being retrieved
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns driver's location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Error retrieving driver's location
        '404':
          description: Driver not found
