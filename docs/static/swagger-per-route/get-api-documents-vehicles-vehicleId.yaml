openapi: 3.0.3
info:
  title: get /api/documents/vehicles/:vehicleId
  version: 1.0.0
paths:
  /api/documents/vehicles/:vehicleId:
    get:
      tags:
        - Documents
      summary: Get documents for a vehicle
      description: Retrieves all documents associated with a specific vehicle.
      operationId: getDocumentsForVehicle
      parameters:
        - name: vehicleId
          in: path
          description: The ID of the vehicle
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving documents
