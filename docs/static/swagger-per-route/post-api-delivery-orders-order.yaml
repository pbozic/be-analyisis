openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/delivery/orders/order:
    post:
      tags:
        - Delivery
      summary: Create a new delivery order.
      description: >-
        This creates a new delivery order with the provided details from the
        request body. Returns the created order if successful.
      operationId: createOrder
      requestBody:
        description: Request body must include necessary order details.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryOrderRequest'
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the newly created order in the
            response body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryOrder'
        '500':
          description: >-
            Server error. Returns error message "Something went wrong..." if any
            exception is encountered during execution.
components: {}
