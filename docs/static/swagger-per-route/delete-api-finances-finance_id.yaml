openapi: 3.0.3
info:
  title: delete /api/finances/:finance_id
  version: 1.0.0
paths:
  /api/finances/:finance_id:
    delete:
      tags:
        - Finance
      summary: Delete finance record
      description: Deletes a finance record by its ID.
      operationId: deleteFinances
      parameters:
        - name: finance_id
          in: path
          description: The ID of the finance record to delete
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Finance record deleted successfully
        '400':
          description: Error deleting finance record
