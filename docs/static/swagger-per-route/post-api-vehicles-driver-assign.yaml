openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/vehicles/driver/assign/:
    post:
      tags:
        - Vehicles
      summary: Assign vehicles to a driver
      description: >-
        Assigns existing vehicles to a driver by creating a vehicle_drivers
        entry.
      requestBody:
        content:
          vehicles:
            schema:
              type: string
          driver_id:
            schema:
              type: string
      responses:
        '200':
          description: Vehicle assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Error assigning vehicles to driver
components: {}
