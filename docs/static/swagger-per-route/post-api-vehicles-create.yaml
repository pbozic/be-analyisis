openapi: 3.0.3
info:
  title: post /api/vehicles/create
  version: 1.0.0
paths:
  /api/vehicles/create:
    post:
      tags:
        - Vehicles
      summary: Create a new vehicle
      description: Adds a new vehicle to the database, including its specifications.
      operationId: createNewVehicle
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vehicle'
        required: true
      responses:
        '201':
          description: Vehicle created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          description: Error creating vehicle
