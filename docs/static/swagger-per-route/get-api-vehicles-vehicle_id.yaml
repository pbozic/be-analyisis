openapi: 3.0.3
info:
  title: get /api/vehicles/:vehicle_id
  version: 1.0.0
paths:
  /api/vehicles/:vehicle_id:
    get:
      tags:
        - Vehicles
      summary: Get a vehicle by ID
      description: Retrieves a single vehicle by its ID from the database.
      parameters:
        - name: vehicle_id
          in: path
          description: The ID of the vehicle to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '404':
          description: Vehicle not found
        '500':
          description: Error fetching vehicle
