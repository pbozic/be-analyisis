openapi: 3.0.3
info:
  title: patch /api/drivers/:driver_id/toggle_orders
  version: 1.0.0
paths:
  /api/drivers/:driver_id/toggle_orders:
    patch:
      tags:
        - Drivers
      summary: Toggle driver's orders he should receive
      description: >-
        This endpoint allows toggling the types of orders a specific driver can
        receive. The request body should contain an object specifying which
        order types (taxi, transfer, delivery) to toggle on or off.
      operationId: toggleDriverOrders
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver to toggle
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Object'
        required: true
      responses:
        '200':
          description: Driver orders toggled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Object'
        '400':
          description: Error toggling driver orders
        '404':
          description: Driver not found
