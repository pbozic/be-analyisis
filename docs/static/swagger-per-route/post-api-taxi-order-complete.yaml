openapi: 3.0.3
info:
  title: post /api/taxi/order/complete
  version: 1.0.0
paths:
  /api/taxi/order/complete:
    post:
      tags:
        - Taxi
      summary: Complete a taxi order.
      description: >-
        Completes a taxi order with the provided order ID from the request body.
        Returns the completed order if successful and emits a 'driver_available'
        event.
      operationId: completeOrder
      requestBody:
        description: Request body must include 'order_id'.
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: >-
            Successful operation. Returns the completed order in the response
            body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxiOrder'
        '500':
          description: >-
            Server error. Console logs the error message and returns it in the
            response.
