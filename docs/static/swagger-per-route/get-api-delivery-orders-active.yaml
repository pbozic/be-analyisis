openapi: 3.0.3
info:
  title: get /api/delivery/orders/active
  version: 1.0.0
paths:
  /api/delivery/orders/active:
    get:
      tags:
        - Delivery
      summary: Get all active delivery orders.
      description: This fetches all active delivery orders.
      operationId: getActiveDeliveryOrders
      responses:
        '200':
          description: >-
            Successful operation. Returns a list of active orders in the
            response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
