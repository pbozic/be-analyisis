openapi: 3.0.3
info:
  title: post /api/business/address/add
  version: 1.0.0
paths:
  /api/business/address/add:
    post:
      tags:
        - Business
      summary: Add an address to a business
      description: Adds an address to a specific business.
      operationId: addBusinessAddress
      parameters:
        - name: business_id
          in: path
          description: The ID of the business
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
        required: true
      responses:
        '200':
          description: Address added successfully
        '400':
          description: Error adding address
