openapi: 3.0.3
info:
  title: get /api/delivery/orders/today
  version: 1.0.0
paths:
  /api/delivery/orders/today:
    get:
      tags:
        - Delivery
      summary: Get all delivery orders for today and earnings.
      description: This fetches all delivery orders for today and earnings.
      operationId: getDeliveryOrdersToday
      responses:
        '200':
          description: >-
            Successful operation. Returns a list of all delivery orders today
            and earnings in the response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
