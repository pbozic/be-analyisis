openapi: 3.0.3
info:
  title: patch /api/drivers/:driver_id/set_current_vehicle
  version: 1.0.0
paths:
  /api/drivers/:driver_id/set_current_vehicle:
    patch:
      tags:
        - Drivers
      summary: Set driver's current vehicle
      description: >-
        This endpoint sets the current vehicle for a specific driver. It first
        checks that the vehicle belongs to the driver. If a vehicle was
        previously assigned, it will be disconnected. The request body should
        contain the new vehicle ID to assign.
      operationId: setDriverCurrentVehicle
      parameters:
        - name: driver_id
          in: path
          description: The ID of the driver
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Object'
        required: true
      responses:
        '200':
          description: Driver vehicle updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Object'
        '400':
          description: Invalid vehicle ID or error setting vehicle
        '404':
          description: Driver or vehicle not found
