openapi: 3.0.3
info:
  title: get /api/delivery/orders/:business_id
  version: 1.0.0
paths:
  /api/delivery/orders/:business_id:
    get:
      tags:
        - Delivery
      summary: Get delivery orders.
      description: This fetches all restaurant orders.
      operationId: getDeliveryOrdersByBusinessId
      responses:
        '200':
          description: Successful operation. Returns a list of orders in the response body.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '500':
          description: >-
            Server error. Returns error message "Error something went wrong..."
            if any exception is encountered during execution.
