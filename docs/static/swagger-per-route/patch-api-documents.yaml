openapi: 3.0.3
info:
  title: patch /api/documents/additionalInfo
  version: 1.0.0
paths:
  /api/documents/additionalInfo:
    patch:
      tags:
        - Documents
      summary: Update document's additional info
      description: Updates the additional information of a specific document.
      operationId: updateDocumentAdditionalInfo
      parameters:
        - name: document_id
          in: path
          description: The ID of the document to update
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdditionalInfoRequest'
        required: true
      responses:
        '200':
          description: Document additional info updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Error updating document's additional info
