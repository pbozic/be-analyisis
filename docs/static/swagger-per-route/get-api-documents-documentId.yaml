openapi: 3.0.3
info:
  title: ''
  version: ''
  description: >
    This is a simple CRUD API application made with Express and documented with
    Swagger
  termsOfService: http://swagger.io/terms/
  contact:
    email: bourdakos1@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  x-github: https://github.com/bee-travels
paths:
  /api/documents/:documentId:
    get:
      tags:
        - Documents
      summary: Get a document by ID
      description: >-
        Retrieves a specific document by its ID. Useful for detailed document
        viewing.
      operationId: getDocumentById
      parameters:
        - name: document_id
          in: path
          description: The ID of the document to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns the document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving the document
components: {}
