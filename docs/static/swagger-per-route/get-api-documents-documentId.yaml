openapi: 3.0.3
info:
  title: get /api/documents/:documentId
  version: 1.0.0
paths:
  /api/documents/:documentId:
    get:
      tags:
        - Documents
      summary: Get a document by ID
      description: >-
        Retrieves a specific document by its ID. Useful for detailed document
        viewing.
      operationId: getDocumentById
      parameters:
        - name: document_id
          in: path
          description: The ID of the document to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns the document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving the document
