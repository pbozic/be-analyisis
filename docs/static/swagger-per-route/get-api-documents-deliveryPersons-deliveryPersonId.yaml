openapi: 3.0.3
info:
  title: get /api/documents/deliveryPersons/:deliveryPersonId
  version: 1.0.0
paths:
  /api/documents/deliveryPersons/:deliveryPersonId:
    get:
      tags:
        - Documents
      summary: Get documents for a delivery person
      description: Retrieves all documents associated with a specific delivery person.
      operationId: getDocumentsForDeliveryPerson
      parameters:
        - name: deliveryPersonId
          in: path
          description: The ID of the delivery person
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation, returns documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '400':
          description: Error retrieving documents
