components:
    schemas:
        UpdateTelephoneRequest:
            type: "object"
            properties:
                telephone:
                    type: "string"
            required: ["telephone"]
        UpdateEmailRequest:
            type: "object"
            properties:
                email:
                    type: "string"
            required: ["email"]
        UpdatePasswordRequest:
            type: "object"
            properties:
                password:
                    type: "string"
                new_password:
                    type: "string"
                confirm_password:
                    type: "string"
            required: ["password", "new_password", "confirm_password"]
        VerifyUserPhoneRequest:
            type: "object"
            properties:
                token:
                    type: "string"
            required: ["token"]
        UpdateUserRequest:
            type: "object"
            properties:
                first_name:
                    type: "string"
                last_name:
                    type: "string"
                email:
                    type: "string"
                telephone:
                    type: "string"
                profile_picture:
                    type: "string"
                address:
                    type: "string"
                user_role:
                    type: "string"
                    enum: ["PERSONAL", "OTHER_ROLE"]
            required: ["first_name", "last_name", "email", "telephone"]
        PasswordResetRequest:
            type: "object"
            properties:
                email:
                    type: "string"
            required: ["email"]
        RefreshTokenRequest:
            type: "object"
            properties:
                refreshToken:
                    type: "string"
            required: ["refreshToken"]
        RefreshTokenResponse:
            type: "object"
            properties:
                accessToken:
                    type: "string"
                refreshToken:
                    type: "string"
        RegisterRequest:
            type: "object"
            properties:
                first_name:
                    type: "string"
                last_name:
                    type: "string"
                email:
                    type: "string"
                password:
                    type: "string"
                confirm_password:
                    type: "string"
                telephone:
                    type: "string"
                profile_picture:
                    type: "string"
            required: ["first_name", "last_name", "email", "password", "telephone", "confirm_password"]
        LoginRequest:
            type: "object"
            properties:
                email:
                    type: "string"
                password:
                    type: "string"
            required: ["email", "password"]
        User:
            type: "object"
            properties:
                first_name:
                    type: "string"
                password:
                    type: "string"
                email:
                    type: "string"
                    unique: true
                telephone:
                    type: "string"
                    unique: true
                profile_picture:
                    type: "string"
                address:
                    type: "string"
                date_create:
                    type: "string"
                    format: "date-time"
                    default: "now()"
                date_modify:
                    type: "string"
                    format: "date-time"
                    default: "now()"
                last_name:
                    type: "string"
                user_id:
                    type: "string"
                    format: "uuid"
                user_role:
                    type: "string"
                    enum: ["PERSONAL", "OTHER_ROLE"]
                    default: "PERSONAL"
            required: ["password", "email", "telephone"]
            uniqueItems:
                - uniqueUserIdentifier:
                      fields:
                          - "email"
                          - "telephone"
            primaryKey: ["user_id"]
        AuthenticatedUser:
            allOf:
                - $ref: "#/components/schemas/User"
                - type: object
                  properties:
                      accessToken:
                          type: string
                      refreshToken:
                          type: string
