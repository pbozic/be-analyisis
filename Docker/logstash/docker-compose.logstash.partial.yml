services:
  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.1
    container_name: logstash
    restart: unless-stopped
    depends_on:
      - klikni_elasticsearch
    ports:
      - "5044:5044"
      - "9600:9600"
    environment:
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./pipeline:/usr/share/logstash/pipeline
      - ./config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["-e", "--strict.perms=false", "-d", "*"]
    networks:
      - shared_network