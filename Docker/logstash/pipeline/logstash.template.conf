input {
  beats {
    port => 5044
  }
}

filter {
  #################################################################
  # NODE.JS / PINO LOGS
  #################################################################
  if [tags] and "pino" in [tags] {
    json {
      source => "message"
      target => "pino"
      skip_on_invalid_json => true
    }

    mutate {
      add_field => {
        "source_type" => "node"
        "message" => "%{[pino][msg]}"
      }
      rename => { "[pino][caller]" => "caller" }
      rename => { "[pino][userId]" => "userId" }
      rename => { "[pino][routePath]" => "routePath" }
      remove_field => ["pino"]
    }
  }

  #################################################################
  # NGINX MODULE LOGS
  #################################################################
  if [fileset][module] == "nginx" and [fileset][name] == "access" {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }

    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "@timestamp"
    }

    mutate {
      add_field => { "source_type" => "nginx_access" }
    }
  }

  if [fileset][module] == "nginx" and [fileset][name] == "error" {
    grok {
      match => { "message" => "\[%{DATA:loglevel}\] %{NUMBER:pid}#%{NUMBER}: \*%{NUMBER} %{GREEDYDATA:error_message}" }
    }

    mutate {
      add_field => { "source_type" => "nginx_error" }
    }
  }

  #################################################################
  # POSTGRESQL MODULE LOGS
  #################################################################
  if [fileset][module] == "postgresql" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{GREEDYDATA:pg_log}" }
    }

    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }

    mutate {
      add_field => { "source_type" => "postgresql" }
    }
  }

  #################################################################
  # GENERAL CLEANUP
  #################################################################
  mutate {
    remove_field => ["host", "agent", "input", "ecs", "log", "container", "docker"]
  }
}

output {
  elasticsearch {
    hosts => ["http://klikni_elasticsearch:9200"]
    index => "logstash-%{[source_type]}-%{+YYYY.MM.dd}"
    user => "${ELASTIC_USERNAME}"
    password => "${ELASTIC_PASSWORD}"
  }

  stdout { codec => rubydebug }
}
