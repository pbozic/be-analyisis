services:
  node-app:
    build:
      context: ../
      dockerfile: ./Docker/node-app/Dockerfile.dev
    volumes:
      - ../:/app
      - ../.env:/app/.env   # mount local .env into container
      - /app/node_modules  # prevent host overwrite
    env_file:
      - ../.env   # and tell Docker Compose to load it
    environment:
      - NODE_ENV=development
  proxy:
    image: nginx:alpine
    ports:
      - "3002:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node-app
    networks:
      - shared_network