services:
  node-app:
    build:
      context: ../../
      dockerfile: ./Docker/node-app/Dockerfile
    container_name: node-app
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared_network
networks:
  shared_network:
    driver: bridge