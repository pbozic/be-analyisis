services:
  # Include services from partials
  klikni_elasticsearch:
    extends:
      file: ./elasticsearch/docker-compose.elasticsearch.partial.yml
      service: klikni_elasticsearch

  kibana:
    extends:
      file: ./kibana/docker-compose.kibana.partial.yml
      service: kibana

  node-app:
    extends:
      file: ./node-app/docker-compose.node-app.partial.yml
      service: node-app

  filebeat:
    extends:
      file: ./filebeat/docker-compose.filebeat.partial.yml
      service: filebeat
  filebeat-setup:
    extends:
      file: ./filebeat/docker-compose.filebeat-setup.partial.yml
      service: filebeat-setup
  init:
    extends:
      file: ./elasticsearch/docker-compose.init.partial.yml
      service: init
  logstash:
    extends:
      file: ./logstash/docker-compose.logstash.partial.yml
      service: logstash
  postgres:
    extends:
      file: ./postgres/docker-compose.postgres.partial.yml
      service: postgres
  redis:
    extends:
      file: ./redis/docker-compose.redis.partial.yml
      service: redis

networks:
  shared_network:
    driver: bridge

volumes:
  shared-init-status:
    driver: local
  redis-data:
  dbdata: