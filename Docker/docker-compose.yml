version: '2'

#Docker Networks

#Volumes
volumes:
  dbdata:
    driver: local

services:
  navibro_elasticsearch:
    build:
      context: elasticsearch/
      args:
        ELASTIC_VERSION: "8.17.1"
    restart: unless-stopped
    volumes:
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "127.0.0.1:19200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    # environment:
    #    - bootstrap.memory_lock=true
    #    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    #    - ELASTIC_PASSWORD="${ELASTIC_PASSWORD}"
    #    - cluster.name=local-navibro
    #    - node.name=local-navibro
    #    - network.host=_site_
    #    - http.port=9200
    #    - transport.port=9300
    #    - discovery.type=single-node
    #    - xpack.license.self_generated.type=trial
    #    - xpack.security.enabled=false
    #    - xpack.security.http.ssl.enabled=false  # Disable SSL on HTTP
    #    - xpack.security.transport.ssl.enabled=false  # Disable SSL on transport layer
    deploy:
      resources:
        limits:
          cpus: "0.6"  # Limit Elasticsearch to use a maximum of 50% of one CPU core
        reservations:
          cpus: "0.2"  # Reserve 20% of one CPU core for Elasticsearch
    networks:
      - shared_network
networks:
  shared_network:
    external: true  # This tells Docker Compose to use an existing external network